openapi: 3.0.3
info:
  title: CPE Editor API
  version: 1.0.0
  description: |
    API and admin endpoints for browsing vendors, products, and CPE entries managed by CPE Editor.
    Read endpoints are under `/api/*`; admin mutation endpoints require an authenticated admin session
    plus CSRF token.
servers:
  - url: /
tags:
  - name: Vendors
  - name: Products
  - name: CPE Entries
  - name: Vulnerability References
  - name: Admin
paths:
  /api/vendors:
    get:
      tags: [Vendors]
      summary: List vendors
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Case-insensitive text search on vendor name or title.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Vendor list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVendors'
  /api/vendors/{vendor_uuid}:
    get:
      tags: [Vendors]
      summary: Get vendor by UUID
      parameters:
        - in: path
          name: vendor_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vendor detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '404':
          description: Not found
  /api/products/{product_uuid}:
    get:
      tags: [Products]
      summary: Get product by UUID
      parameters:
        - in: path
          name: product_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not found
  /api/cpes:
    get:
      tags: [CPE Entries]
      summary: List CPE entries
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Broad case-insensitive search over URI, title, vendor, product, and version.
        - in: query
          name: vendor_q
          schema:
            type: string
          description: Vendor name/title prefix filter.
        - in: query
          name: product_q
          schema:
            type: string
          description: Product name/title prefix filter.
        - in: query
          name: part
          schema:
            type: string
            enum: [a, o, h]
          description: CPE part value.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: CPE list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCPEs'
  /api/cpes/{cpe_id}:
    get:
      tags: [CPE Entries]
      summary: Get CPE by numeric ID
      parameters:
        - in: path
          name: cpe_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: CPE detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPEEntry'
        '404':
          description: Not found
  /api/cpes/{cpe_id}/vulnerability-references:
    get:
      tags: [Vulnerability References]
      summary: List vulnerability references for a CPE entry
      parameters:
        - in: path
          name: cpe_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vulnerability references attached to the CPE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPEVulnerabilityReferenceListByCPE'
        '404':
          description: Not found
  /api/vulnerability-references:
    get:
      tags: [Vulnerability References]
      summary: List vulnerability references across CPE entries
      parameters:
        - in: query
          name: vulnerability_id
          schema:
            type: string
          description: Case-insensitive substring filter on vulnerability identifier.
        - in: query
          name: vulnerability_source
          schema:
            type: string
            enum: [CVE, GCVE, GHSA]
          description: Exact source filter.
        - in: query
          name: cpe_id
          schema:
            type: integer
          description: Restrict results to one CPE entry ID.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Paginated vulnerability references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCPEVulnerabilityReferences'
  /admin/notes/{note_id}/delete:
    post:
      tags: [Admin]
      summary: Delete an approved note (admin only)
      description: Requires admin session and valid CSRF token in form body.
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [csrf_token]
              properties:
                csrf_token:
                  type: string
      responses:
        '302':
          description: Note deleted and redirected back to relevant detail page.
        '400':
          description: Missing or invalid CSRF token.
        '404':
          description: Note not found.
  /admin/metadata/{metadata_id}/delete:
    post:
      tags: [Admin]
      summary: Delete an approved metadata entry (admin only)
      description: Requires admin session and valid CSRF token in form body.
      parameters:
        - in: path
          name: metadata_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [csrf_token]
              properties:
                csrf_token:
                  type: string
      responses:
        '302':
          description: Metadata entry deleted and redirected back to relevant detail page.
        '400':
          description: Missing or invalid CSRF token.
        '404':
          description: Metadata entry not found.
  /admin/relationships/{relationship_id}/delete:
    post:
      tags: [Admin]
      summary: Delete an approved relationship (admin only)
      description: Requires admin session and valid CSRF token in form body.
      parameters:
        - in: path
          name: relationship_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [csrf_token]
              properties:
                csrf_token:
                  type: string
      responses:
        '302':
          description: Relationship deleted and redirected back to relevant detail page.
        '400':
          description: Missing or invalid CSRF token.
        '404':
          description: Relationship not found.
components:
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
    Vendor:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        product_count:
          type: integer
        approved_notes:
          type: array
          items:
            $ref: '#/components/schemas/EntityNote'
        approved_metadata:
          type: array
          items:
            $ref: '#/components/schemas/EntityMetadata'
        approved_relationships:
          type: array
          items:
            $ref: '#/components/schemas/EntityRelationship'
    Product:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        vendor_id:
          type: integer
        vendor_uuid:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        cpe_count:
          type: integer
        approved_notes:
          type: array
          items:
            $ref: '#/components/schemas/EntityNote'
        approved_metadata:
          type: array
          items:
            $ref: '#/components/schemas/EntityMetadata'
        approved_relationships:
          type: array
          items:
            $ref: '#/components/schemas/EntityRelationship'
    EntityRecordRef:
      type: object
      nullable: true
      properties:
        entity_type:
          type: string
          enum: [vendor, product]
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        title:
          type: string
          nullable: true
    EntityRelationship:
      type: object
      properties:
        id:
          type: integer
        relationship_type:
          type: string
        relationship_type_description:
          type: string
          nullable: true
        proposal_id:
          type: integer
          nullable: true
        rationale:
          type: string
          nullable: true
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        source:
          $ref: '#/components/schemas/EntityRecordRef'
        target:
          $ref: '#/components/schemas/EntityRecordRef'
    EntityNote:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
          nullable: true
        product_id:
          type: integer
          nullable: true
        proposal_id:
          type: integer
          nullable: true
        note_text:
          type: string
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
    EntityMetadata:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
          nullable: true
        product_id:
          type: integer
          nullable: true
        proposal_id:
          type: integer
          nullable: true
        metadata_key:
          type: string
        metadata_value:
          type: string
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
    CPEEntry:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
        vendor_uuid:
          type: string
          format: uuid
          nullable: true
        product_id:
          type: integer
        product_uuid:
          type: string
          format: uuid
          nullable: true
        cpe_uri:
          type: string
        cpe_name_id:
          type: string
          format: uuid
          nullable: true
        deprecated:
          type: boolean
        deprecated_by:
          type: string
          nullable: true
        part:
          type: string
        version:
          type: string
          nullable: true
        update:
          type: string
          nullable: true
        edition:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        sw_edition:
          type: string
          nullable: true
        target_sw:
          type: string
          nullable: true
        target_hw:
          type: string
          nullable: true
        other:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        from_proposal:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        vulnerability_references:
          type: array
          items:
            $ref: '#/components/schemas/CPEVulnerabilityReference'
    CPEVulnerabilityReference:
      type: object
      properties:
        id:
          type: integer
        cpe_entry_id:
          type: integer
        cpe_uri:
          type: string
          nullable: true
        vulnerability_source:
          type: string
          enum: [CVE, GCVE, GHSA]
        vulnerability_id:
          type: string
        cpe_applicability:
          type: string
          enum: [vulnerable, not_vulnerable, requires_configuration, under_investigation]
        rationale:
          type: string
          nullable: true
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    CPEVulnerabilityReferenceListByCPE:
      type: object
      properties:
        cpe:
          type: object
          properties:
            id:
              type: integer
            cpe_uri:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CPEVulnerabilityReference'
        total:
          type: integer
    PaginatedVendors:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Vendor'
    PaginatedCPEs:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CPEEntry'
    PaginatedCPEVulnerabilityReferences:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CPEVulnerabilityReference'
