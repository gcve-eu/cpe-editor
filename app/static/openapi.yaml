openapi: 3.0.3
info:
  title: CPE Editor API
  version: 1.0.0
  description: |
    API and admin endpoints for browsing vendors, products, and CPE entries managed by CPE Editor.
    Read endpoints are under `/api/*`; admin mutation endpoints require an authenticated admin session
    plus CSRF token.
servers:
  - url: /
tags:
  - name: Vendors
  - name: Products
  - name: Product Aliases
  - name: CPE Entries
  - name: Vulnerability References
  - name: Statistics
  - name: Changes
  - name: Admin
paths:
  /api/statistics:
    get:
      tags: [Statistics]
      summary: Get dataset statistics
      description: Returns the aggregate counts, averages, CPE part distribution, and top vendor shown on the statistics page as clean JSON.
      responses:
        '200':
          description: Dataset statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsSummary'
  /api/statistics/top-list:
    get:
      tags: [Statistics]
      summary: List top vendors or products
      description: Returns a paginated top list for vendors ranked by product count or products ranked by CPE count.
      parameters:
        - in: query
          name: entity
          schema:
            type: string
            enum: [vendors, products]
            default: vendors
          description: Select which top list to return. Singular aliases are accepted by the API.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Paginated top list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStatisticsTopList'
        '400':
          description: Unknown entity value.
  /api/vendors:
    get:
      tags: [Vendors]
      summary: List vendors
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Case-insensitive text search on vendor name or title.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Vendor list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVendors'
  /api/vendors/{vendor_uuid}:
    get:
      tags: [Vendors]
      summary: Get vendor by UUID
      parameters:
        - in: path
          name: vendor_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vendor detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '404':
          description: Not found
  /api/products/{product_uuid}:
    get:
      tags: [Products]
      summary: Get product by UUID
      parameters:
        - in: path
          name: product_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not found
  /api/aliases:
    get:
      tags: [Product Aliases]
      summary: List product aliases
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Case-insensitive text search on alias name or description.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Product alias list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductAliases'
  /api/aliases/{alias_uuid}:
    get:
      tags: [Product Aliases]
      summary: Get product alias by UUID
      parameters:
        - in: path
          name: alias_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product alias detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductAlias'
        '404':
          description: Not found
  /api/cpes:
    get:
      tags: [CPE Entries]
      summary: List CPE entries
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Broad case-insensitive search over URI, title, vendor, product, and version.
        - in: query
          name: vendor_q
          schema:
            type: string
          description: Vendor name/title prefix filter.
        - in: query
          name: product_q
          schema:
            type: string
          description: Product name/title prefix filter.
        - in: query
          name: purl_q
          schema:
            type: string
          description: PURL prefix filter.
        - in: query
          name: part
          schema:
            type: string
            enum: [a, o, h]
          description: CPE part value.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: CPE list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCPEs'
  /api/cpes/{cpe_id}:
    get:
      tags: [CPE Entries]
      summary: Get CPE by numeric ID
      parameters:
        - in: path
          name: cpe_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: CPE detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPEEntry'
        '404':
          description: Not found
  /api/cpes/{cpe_id}/vulnerability-references:
    get:
      tags: [Vulnerability References]
      summary: List vulnerability references for a CPE entry
      parameters:
        - in: path
          name: cpe_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vulnerability references attached to the CPE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPEVulnerabilityReferenceListByCPE'
        '404':
          description: Not found
  /api/vulnerability-references:
    get:
      tags: [Vulnerability References]
      summary: List vulnerability references across CPE entries
      parameters:
        - in: query
          name: vulnerability_id
          schema:
            type: string
          description: Case-insensitive substring filter on vulnerability identifier.
        - in: query
          name: vulnerability_source
          schema:
            type: string
            enum: [CVE, GCVE, GHSA]
          description: Exact source filter.
        - in: query
          name: cpe_id
          schema:
            type: integer
          description: Restrict results to one CPE entry ID.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Paginated vulnerability references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCPEVulnerabilityReferences'
  /api/changes:
    get:
      tags: [Changes]
      summary: List approved changes
      description: Returns accepted proposals from the public approved changes history.
      parameters:
        - in: query
          name: proposal_type
          schema:
            type: string
          description: Exact proposal type filter, such as `edit_cpe` or `new_cpe_vulnerability_reference`.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - in: query
          name: include
          schema:
            type: string
            enum: [bcp10]
          description: Include a GCVE BCP-10-compatible `cpe-editor-dataset` change bundle for the returned page.
      responses:
        '200':
          description: Paginated approved changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovedChanges'
  /api/changes/{proposal_id}:
    get:
      tags: [Changes]
      summary: Get approved change by proposal ID
      parameters:
        - in: path
          name: proposal_id
          required: true
          schema:
            type: integer
        - in: query
          name: include
          schema:
            type: string
            enum: [bcp10]
          description: Include a GCVE BCP-10-compatible `cpe-editor-dataset` change bundle for this change.
      responses:
        '200':
          description: Approved change detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedChange'
        '404':
          description: Not found
  /admin/notes/{note_id}/delete:
    post:
      tags: [Admin]
      summary: Delete an approved note (admin only)
      description: Requires admin session and valid CSRF token in form body.
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [csrf_token]
              properties:
                csrf_token:
                  type: string
      responses:
        '302':
          description: Note deleted and redirected back to relevant detail page.
        '400':
          description: Missing or invalid CSRF token.
        '404':
          description: Note not found.
  /admin/metadata/{metadata_id}/delete:
    post:
      tags: [Admin]
      summary: Delete an approved metadata entry (admin only)
      description: Requires admin session and valid CSRF token in form body.
      parameters:
        - in: path
          name: metadata_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [csrf_token]
              properties:
                csrf_token:
                  type: string
      responses:
        '302':
          description: Metadata entry deleted and redirected back to relevant detail page.
        '400':
          description: Missing or invalid CSRF token.
        '404':
          description: Metadata entry not found.
  /admin/relationships/{relationship_id}/delete:
    post:
      tags: [Admin]
      summary: Delete an approved relationship (admin only)
      description: Requires admin session and valid CSRF token in form body.
      parameters:
        - in: path
          name: relationship_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [csrf_token]
              properties:
                csrf_token:
                  type: string
      responses:
        '302':
          description: Relationship deleted and redirected back to relevant detail page.
        '400':
          description: Missing or invalid CSRF token.
        '404':
          description: Relationship not found.
components:
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
    Vendor:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        product_count:
          type: integer
        approved_notes:
          type: array
          items:
            $ref: '#/components/schemas/EntityNote'
        approved_metadata:
          type: array
          items:
            $ref: '#/components/schemas/EntityMetadata'
        approved_relationships:
          type: array
          items:
            $ref: '#/components/schemas/EntityRelationship'
    Product:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        vendor_id:
          type: integer
        vendor_uuid:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        cpe_count:
          type: integer
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/ProductAliasSummary'
        approved_notes:
          type: array
          items:
            $ref: '#/components/schemas/EntityNote'
        approved_metadata:
          type: array
          items:
            $ref: '#/components/schemas/EntityMetadata'
        approved_relationships:
          type: array
          items:
            $ref: '#/components/schemas/EntityRelationship'
    ProductAliasSummary:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        proposal_id:
          type: integer
          nullable: true
        member_count:
          type: integer
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    ProductAliasMember:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
        vendor_uuid:
          type: string
          format: uuid
          nullable: true
        vendor_name:
          type: string
          nullable: true
        vendor_title:
          type: string
          nullable: true
        product_id:
          type: integer
        product_uuid:
          type: string
          format: uuid
          nullable: true
        product_name:
          type: string
          nullable: true
        product_title:
          type: string
          nullable: true
    ProductAlias:
      allOf:
        - $ref: '#/components/schemas/ProductAliasSummary'
        - type: object
          properties:
            submitter_name:
              type: string
              nullable: true
            submitter_email:
              type: string
              nullable: true
            members:
              type: array
              items:
                $ref: '#/components/schemas/ProductAliasMember'
    EntityRecordRef:
      type: object
      nullable: true
      properties:
        entity_type:
          type: string
          enum: [vendor, product]
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        title:
          type: string
          nullable: true
    EntityRelationship:
      type: object
      properties:
        id:
          type: integer
        relationship_type:
          type: string
        relationship_type_description:
          type: string
          nullable: true
        proposal_id:
          type: integer
          nullable: true
        rationale:
          type: string
          nullable: true
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        source:
          $ref: '#/components/schemas/EntityRecordRef'
        target:
          $ref: '#/components/schemas/EntityRecordRef'
    EntityNote:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
          nullable: true
        product_id:
          type: integer
          nullable: true
        proposal_id:
          type: integer
          nullable: true
        note_text:
          type: string
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
    EntityMetadata:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
          nullable: true
        product_id:
          type: integer
          nullable: true
        proposal_id:
          type: integer
          nullable: true
        metadata_key:
          type: string
        metadata_value:
          type: string
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
    ApprovedChangeRecordRef:
      type: object
      nullable: true
      properties:
        entity_type:
          type: string
          enum: [vendor, product, cpe]
        id:
          type: integer
        uuid:
          type: string
          format: uuid
          nullable: true
        vendor_id:
          type: integer
          nullable: true
        vendor_uuid:
          type: string
          format: uuid
          nullable: true
        product_id:
          type: integer
          nullable: true
        product_uuid:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        cpe_uri:
          type: string
          nullable: true
    ApprovedChangeProposedFields:
      type: object
      properties:
        vendor_name:
          type: string
          nullable: true
        vendor_title:
          type: string
          nullable: true
        product_name:
          type: string
          nullable: true
        product_title:
          type: string
          nullable: true
        part:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        update:
          type: string
          nullable: true
        edition:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        sw_edition:
          type: string
          nullable: true
        target_sw:
          type: string
          nullable: true
        target_hw:
          type: string
          nullable: true
        other:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        cpe_uri:
          type: string
          nullable: true
        relationship_type:
          type: string
          nullable: true
        metadata_key:
          type: string
          nullable: true
        metadata_value:
          type: string
          nullable: true
        vulnerability_id:
          type: string
          nullable: true
        vulnerability_source:
          type: string
          nullable: true
        cpe_applicability:
          type: string
          nullable: true
        alias_name:
          type: string
          nullable: true
        alias_description:
          type: string
          nullable: true
        alias_members:
          type: array
          nullable: true
          items:
            type: object
            properties:
              vendor_id:
                type: integer
              product_id:
                type: integer
    ApprovedChangeAppliedRecords:
      type: object
      properties:
        note:
          $ref: '#/components/schemas/EntityNote'
        metadata:
          $ref: '#/components/schemas/EntityMetadata'
        relationship:
          $ref: '#/components/schemas/EntityRelationship'
        vulnerability_reference:
          $ref: '#/components/schemas/CPEVulnerabilityReference'
        product_alias:
          $ref: '#/components/schemas/ProductAlias'
    BCP10DatasetCounts:
      type: object
      properties:
        vendors:
          type: integer
        products:
          type: integer
        cpes:
          type: integer
        metadata:
          type: integer
        relationships:
          type: integer
        proposals:
          type: integer
    BCP10Vendor:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    BCP10Product:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        vendor_uuid:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    BCP10CPE:
      allOf:
        - $ref: '#/components/schemas/CPEEntry'
      description: CPE entry serialized with GCVE BCP-10 field names and UUID links.
    BCP10Metadata:
      type: object
      properties:
        record_uuid:
          type: string
          format: uuid
        record_type:
          type: string
          enum: [vendor, product]
        metadata_key:
          type: string
        metadata_value:
          type: string
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    BCP10Relationship:
      type: object
      properties:
        relationship_type:
          type: string
        source_vendor_uuid:
          type: string
          format: uuid
          nullable: true
        source_product_uuid:
          type: string
          format: uuid
          nullable: true
        target_vendor_uuid:
          type: string
          format: uuid
          nullable: true
        target_product_uuid:
          type: string
          format: uuid
          nullable: true
        rationale:
          type: string
          nullable: true
        submitter_name:
          type: string
          nullable: true
        submitter_email:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    BCP10ChangeBundle:
      type: object
      description: GCVE BCP-10-compatible `cpe-editor-dataset` bundle containing records touched by approved changes.
      properties:
        format:
          type: string
          enum: [cpe-editor-dataset]
        version:
          type: string
        profile:
          type: string
          enum: [gcve-bcp-10-change-bundle]
        exported_at:
          type: string
          format: date-time
        counts:
          $ref: '#/components/schemas/BCP10DatasetCounts'
        vendors:
          type: array
          items:
            $ref: '#/components/schemas/BCP10Vendor'
        products:
          type: array
          items:
            $ref: '#/components/schemas/BCP10Product'
        cpes:
          type: array
          items:
            $ref: '#/components/schemas/BCP10CPE'
        metadata:
          type: array
          items:
            $ref: '#/components/schemas/BCP10Metadata'
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/BCP10Relationship'
        proposals:
          type: array
          items:
            $ref: '#/components/schemas/ApprovedChangeProposedFields'
    ApprovedChangeLinks:
      type: object
      properties:
        html:
          type: string
        api:
          type: string
    ApprovedChange:
      type: object
      properties:
        id:
          type: integer
        proposal_type:
          type: string
        status:
          type: string
          enum: [accepted]
        summary:
          type: string
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        review_comment:
          type: string
