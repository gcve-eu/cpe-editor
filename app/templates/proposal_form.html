{% extends "base.html" %}
{% block title %}Submit proposal{% endblock %}
{% block content %}
<div class="card">
  <h1>Submit a proposal</h1>
  <p class="muted">Anonymous contributions are allowed. An admin must accept them before publication.</p>
  <form method="post">
    <div class="grid grid-2">
      <div>
        <label for="proposal_type">Proposal type</label>
        <select id="proposal_type" name="proposal_type">
          <option value="edit_cpe">Edit an existing CPE</option>
          <option value="new_cpe">Add a CPE to an existing vendor/product</option>
          <option value="new_product">Add a product to an existing vendor</option>
          <option value="new_vendor_product">Add a new vendor and product</option>
        </select>
      </div>
      <div>
        <label for="proposed_part">Part</label>
        <select id="proposed_part" name="proposed_part">
          <option value="a">Application (a)</option>
          <option value="o">Operating system (o)</option>
          <option value="h">Hardware (h)</option>
        </select>
      </div>
    </div>

    <div class="grid grid-2">
      <div>
        <label for="submitter_name">Your name</label>
        <input id="submitter_name" name="submitter_name">
      </div>
      <div>
        <label for="submitter_email">Your email</label>
        <input id="submitter_email" name="submitter_email" type="email">
      </div>
    </div>

    <div class="grid grid-2">
      <div>
        <label for="vendor_id">Existing vendor</label>
        <select id="vendor_id" name="vendor_id">
          <option value="">None selected</option>
          {% for vendor in vendors %}
            <option value="{{ vendor.id }}">{{ vendor.title or vendor.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="product_id">Existing product ID</label>
        <input id="product_id" name="product_id" placeholder="Optional skeleton shortcut; replace with searchable picker later">
      </div>
    </div>

    <div class="grid grid-2">
      <div>
        <label for="cpe_entry_id">Existing CPE entry ID</label>
        <input id="cpe_entry_id" name="cpe_entry_id" placeholder="Needed for edit proposals">
      </div>
      <div>
        <label for="proposed_vendor_name">Proposed vendor token</label>
        <input id="proposed_vendor_name" name="proposed_vendor_name" placeholder="e.g. microsoft">
      </div>
    </div>

    <div class="grid grid-2">
      <div>
        <label for="proposed_vendor_title">Vendor display title</label>
        <input id="proposed_vendor_title" name="proposed_vendor_title" placeholder="e.g. Microsoft">
      </div>
      <div>
        <label for="proposed_product_name">Proposed product token</label>
        <input id="proposed_product_name" name="proposed_product_name" placeholder="e.g. exchange_server">
      </div>
    </div>

    <div class="grid grid-2">
      <div>
        <label for="proposed_product_title">Product display title</label>
        <input id="proposed_product_title" name="proposed_product_title" placeholder="e.g. Exchange Server">
      </div>
      <div>
        <label for="proposed_title">CPE display title</label>
        <input id="proposed_title" name="proposed_title" placeholder="e.g. Microsoft Exchange Server 2019">
      </div>
    </div>

    <div class="grid grid-2">
      <div><label for="proposed_version">Version</label><input id="proposed_version" name="proposed_version" value="*"></div>
      <div><label for="proposed_update">Update</label><input id="proposed_update" name="proposed_update" value="*"></div>
      <div><label for="proposed_edition">Edition</label><input id="proposed_edition" name="proposed_edition" value="*"></div>
      <div><label for="proposed_language">Language</label><input id="proposed_language" name="proposed_language" value="*"></div>
      <div><label for="proposed_sw_edition">Software edition</label><input id="proposed_sw_edition" name="proposed_sw_edition" value="*"></div>
      <div><label for="proposed_target_sw">Target software</label><input id="proposed_target_sw" name="proposed_target_sw" value="*"></div>
      <div><label for="proposed_target_hw">Target hardware</label><input id="proposed_target_hw" name="proposed_target_hw" value="*"></div>
      <div><label for="proposed_other">Other</label><input id="proposed_other" name="proposed_other" value="*"></div>
    </div>

    <label for="proposed_notes">Notes</label>
    <textarea id="proposed_notes" name="proposed_notes"></textarea>

    <label for="rationale">Why should this be changed?</label>
    <textarea id="rationale" name="rationale" placeholder="Source, justification, references, etc."></textarea>

    <p><button type="submit">Submit proposal</button></p>
  </form>
</div>
{% endblock %}
